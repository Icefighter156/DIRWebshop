<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kontakt | CodeAcademy</title>

  <link rel="stylesheet" href="stylesheet.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-inner">

    <div class="logo">

  <span>
    CodeAcademy
  </span>

    <img style="padding-bottom: 10px;"
    src="images/bildmarke.png"
    alt="CodeAcademy Logo"
    class="logo-img"/>

</div>

      <nav class="nav">
        <a href="index.html">Startseite</a>
        <a href="index.html#preise">Preise</a>
        <a href="datenschutz.html">Datenschutz</a>
      </nav>

      <button class="btn">
        Jetzt lernen
      </button>

    </div>
  </header>

  <!-- KONTAKT -->
  <section class="section">
    <div class="container contact-page">

      <h1>Kontakt</h1>

      <p class="muted contact-intro">
        Du hast Fragen zu unseren Kursen oder brauchst Unterstützung?
        Schreib uns einfach über das Kontaktformular.
      </p>

      <!-- KONTAKT BOX -->
      <div class="contact-grid">

        <!-- FORMULAR -->
        <div class="card">

          <form class="contact-form">

            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" placeholder="Max Mustermann" />
            </div>

            <div class="form-group">
              <label for="email">E-Mail</label>
              <input type="email" id="email" placeholder="max@email.com" />
            </div>

            <div class="form-group">
              <label for="message">Nachricht</label>

              <textarea
                id="message"
                rows="6"
                placeholder="Deine Nachricht..."
              ></textarea>
            </div>

            <button type="submit" class="btn">
              Nachricht senden
            </button>

          </form>

        </div>

      </div>

    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
  
      <div class="footer-logo">
        <h3>CodeAcademy</h3>
        <p class="muted">
          Moderne Coding-Kurse für Webentwicklung.
        </p>
      </div>
  
      <nav class="footer-nav">
        <a href="lizenz.html">Lizenz</a>
        <a href="kontakt.html">Kontakt</a>
        <a href="datenschutz.html">Datenschutzerklärung</a>
        <a href="aboutUs.html">About Us</a>
        <a href="barrierefreiheit.html">Barrierefreiheitserklärung</a>
        <a href="impressum.html">Impressum</a>
      </nav>
  
    </div>
  </footer>
</body>
</html>
