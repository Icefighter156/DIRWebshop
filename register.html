<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Registrieren | CodeAcademy</title>

  <link rel="stylesheet" href="stylesheet.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container header-inner">

      <div class="logo">
        CodeAcademy
      </div>

      <nav class="nav">
        <a href="index.html">Startseite</a>
        <a href="index.html#preise">Preise</a>
        <a href="kontakt.html">Kontakt</a>
      </nav>

      <a href="login.html" class="btn secondary">
        Login
      </a>

    </div>
  </header>

  <!-- REGISTER -->
  <section class="section register-section">

    <div class="container">

      <div class="register-card">

        <div class="register-header">
          <h1>Account erstellen</h1>

          <p class="muted">
            Starte deine Coding-Reise noch heute.
          </p>
        </div>

        <form class="register-form">

          <!-- NAME -->
          <div class="form-group">

            <label for="fullname">
              Vollständiger Name
            </label>

            <input
              type="text"
              id="fullname"
              placeholder="Max Mustermann"
              required
              minlength="3"
            />

          </div>

          <!-- EMAIL -->
          <div class="form-group">

            <label for="email">
              E-Mail-Adresse
            </label>

            <input
              type="email"
              id="email"
              placeholder="max@email.com"
              required
            />

          </div>

          <!-- PASSWORD -->
          <div class="form-group">

            <label for="password">
              Passwort
            </label>

            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
              minlength="8"
            />

          </div>

          <!-- PASSWORD REPEAT -->
          <div class="form-group">

            <label for="repeat-password">
              Passwort wiederholen
            </label>

            <input
              type="password"
              id="repeat-password"
              placeholder="••••••••"
              required
              minlength="8"
            />

          </div>

          <!-- CHECKBOX -->
          <div class="checkbox-group">

            <input
              type="checkbox"
              id="terms"
              required
            />

            <label for="terms">

              Ich akzeptiere die

              <a href="datenschutz.html">
                Datenschutzerklärung
              </a>

              und die

              <a href="lizenz.html">
                Nutzungsbedingungen
              </a>.

            </label>

          </div>

          <!-- BUTTON -->
          <button type="submit" class="btn register-btn">
            Kostenlos registrieren
          </button>

        </form>

      </div>

    </div>

  </section>

</body>
</html>
